services:
  - type: web
    name: sorgux-bot
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER_EXTERNAL_URL
        value: https://sorgux-bot.onrender.com
    plan: free
